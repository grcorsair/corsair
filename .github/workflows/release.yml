name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for npm trusted publishing (OIDC)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.8"

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run tests
      run: bun test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        gh release create "$TAG_NAME" \
          --title "$TAG_NAME" \
          --generate-notes || echo "Release $TAG_NAME already exists"

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for npm trusted publishing
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.8"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Sync version from tag
      env:
        TAG_NAME: ${{ github.ref_name }}
      run: |
        VERSION="${TAG_NAME#v}"
        npm version "$VERSION" --no-git-tag-version --allow-same-version

    - name: Publish CLI to npm (OIDC — no token needed)
      env:
        NPM_CONFIG_PROVENANCE: "true"
      run: npm publish --provenance --access public --include-workspace-root

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Compute version + sha
      id: sha
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        URL="https://github.com/grcorsair/corsair/archive/refs/tags/v${VERSION}.tar.gz"
        SHA=$(curl -L "$URL" | shasum -a 256 | awk '{print $1}')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"

    - name: Get GitHub App token
      id: app
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.HOMEBREW_APP_ID }}
        private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
        owner: grcorsair
        repositories: homebrew-corsair

    - name: Checkout tap repo
      uses: actions/checkout@v4
      with:
        repository: grcorsair/homebrew-corsair
        token: ${{ steps.app.outputs.token }}
        path: tap

    - name: Update formula
      run: |
        FILE="tap/Formula/corsair.rb"
        VERSION="${{ steps.sha.outputs.version }}"
        SHA="${{ steps.sha.outputs.sha }}"
        sed -i "s|url \".*\"|url \"https://github.com/grcorsair/corsair/archive/refs/tags/v${VERSION}.tar.gz\"|" "$FILE"
        sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FILE"
        sed -i "s|version \".*\"|version \"${VERSION}\"|" "$FILE"

    - name: Commit + push
      run: |
        cd tap
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/corsair.rb
        git commit -m "chore: update corsair to v${{ steps.sha.outputs.version }}"
        git push

  verify-homebrew:
    needs: update-homebrew
    runs-on: ubuntu-latest
    steps:
    - name: Compute version + sha
      id: sha
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        URL="https://github.com/grcorsair/corsair/archive/refs/tags/v${VERSION}.tar.gz"
        SHA=$(curl -L "$URL" | shasum -a 256 | awk '{print $1}')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"

    - name: Verify tap formula
      env:
        EXPECTED_VERSION: ${{ steps.sha.outputs.version }}
        EXPECTED_URL: ${{ steps.sha.outputs.url }}
        EXPECTED_SHA: ${{ steps.sha.outputs.sha }}
      run: |
        FORMULA=$(curl -L https://raw.githubusercontent.com/grcorsair/homebrew-corsair/main/Formula/corsair.rb)
        echo "$FORMULA" | grep -q "url \"${EXPECTED_URL}\"" || { echo "url mismatch"; exit 1; }
        echo "$FORMULA" | grep -q "sha256 \"${EXPECTED_SHA}\"" || { echo "sha mismatch"; exit 1; }
        echo "$FORMULA" | grep -q "version \"${EXPECTED_VERSION}\"" || { echo "version mismatch"; exit 1; }

    # SDK publish intentionally disabled — SDK is coming soon and not actively maintained.
